<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a2b3c;
      --muted: #5a7080;
      --accent: #2e7d9f;
      --bg: #f4f0eb;
      --card: #fdfcfa;
      --border: #d4cfc8;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrapper {
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: var(--ink);
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .field {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(46,125,159,0.12);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      margin-top: 0.8rem;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #236585; }
    button:active { transform: scale(0.98); }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      color: var(--accent);
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Send us a <em>message</em></h1>
    <div class="card">
      <div class="row">
        <div class="field">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Jane Doe" />
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+254 700 000 000" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="jane@example.com" />
      </div>

      <div class="field">
        <label for="subject">Subject Line</label>
        <input type="text" id="subject" placeholder="What's this about?" />
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message here…"></textarea>
      </div>

      <button onclick="handleSubmit()">Send Message →</button>
      <p class="success" id="success">✓ Message sent! We'll get back to you soon.</p>
    </div>
  </div>

  <script>
    function handleSubmit() {
      const fields = ['fullname','email','phone','subject','message'];
      let valid = true;
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) {
          el.style.borderColor = '#c0392b';
          valid = false;
        } else {
          el.style.borderColor = '';
        }
      });
      if (valid) {
        document.getElementById('success').style.display = 'block';
        fields.forEach(id => document.getElementById(id).value = '');
      }
    }
  </script>
</body>
</html>
